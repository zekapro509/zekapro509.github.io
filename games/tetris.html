<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тетрис - TLC zekapro509</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Google Sans', Arial, sans-serif;
            font-weight: 500;
        }
        .game-container {
            text-align: center;
            padding: 20px;
        }
        canvas {
            background-color: #000;
            display: block;
            margin: 20px auto;
            border: 2px solid #000;
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #000000;
            color: #ffffff;
            border: 2px solid #000000;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            z-index: 1000;
            text-decoration: none;
        }
        .back-btn:hover {
            background: #ffffff;
            color: #000000;
            border: 2px solid #000000;
        }
        .score {
            font-size: 24px;
            margin-bottom: 10px;
        }
        button {
            background: #000000;
            color: #ffffff;
            border: 2px solid #000000;
            padding: 8px 24px;
            font-size: 18px;
            font-family: 'Google Sans', Arial, sans-serif;
            font-weight: 500;
            border-radius: 90px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>
    <a href="./" class="back-btn">←</a>

    <div class="game-container">
        <h1>Тетрис</h1>
        <div class="score">Счёт: <span id="score">0</span></div>
        <canvas id="tetrisCanvas" width="300" height="600"></canvas>
        <br>
        <button id="resetBtn">Новая игра</button>
    </div>

    <script>
        const canvas = document.getElementById('tetrisCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        const COLS = 10;
        const ROWS = 20;
        const CELL_SIZE = 30;

        let board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        let score = 0;
        let activePiece = null;
        let gameInterval = null;

        const pieces = [
            { shape: [[1,1,1,1]], color: '#00ffff' }, // I
            { shape: [[1,1],[1,1]], color: '#ffff00' }, // O
            { shape: [[0,1,0],[1,1,1]], color: '#aa00ff' }, // T
            { shape: [[1,0,0],[1,1,1]], color: '#ffa500' }, // L
            { shape: [[0,0,1],[1,1,1]], color: '#0000ff' }, // J
            { shape: [[0,1,1],[1,1,0]], color: '#00ff00' }, // S
            { shape: [[1,1,0],[0,1,1]], color: '#ff0000' }  // Z
        ];

        function randomPiece() {
            const idx = Math.floor(Math.random() * pieces.length);
            const piece = pieces[idx];
            return {
                shape: piece.shape.map(row => [...row]),
                color: piece.color,
                x: Math.floor((COLS - piece.shape[0].length) / 2),
                y: 0
            };
        }

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    if (board[row][col]) {
                        ctx.fillStyle = board[row][col];
                        ctx.fillRect(col * CELL_SIZE, row * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
                    }
                }
            }
            
            if (activePiece) {
                for (let row = 0; row < activePiece.shape.length; row++) {
                    for (let col = 0; col < activePiece.shape[0].length; col++) {
                        if (activePiece.shape[row][col]) {
                            ctx.fillStyle = activePiece.color;
                            ctx.fillRect((activePiece.x + col) * CELL_SIZE, (activePiece.y + row) * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
                        }
                    }
                }
            }
        }

        function collision(shape, offsetX, offsetY) {
            for (let row = 0; row < shape.length; row++) {
                for (let col = 0; col < shape[0].length; col++) {
                    if (shape[row][col]) {
                        const x = offsetX + col;
                        const y = offsetY + row;
                        if (x < 0 || x >= COLS || y >= ROWS || y < 0) return true;
                        if (y >= 0 && board[y][x]) return true;
                    }
                }
            }
            return false;
        }

        function mergePiece() {
            for (let row = 0; row < activePiece.shape.length; row++) {
                for (let col = 0; col < activePiece.shape[0].length; col++) {
                    if (activePiece.shape[row][col]) {
                        const y = activePiece.y + row;
                        const x = activePiece.x + col;
                        if (y >= 0) board[y][x] = activePiece.color;
                    }
                }
            }
            
            let linesCleared = 0;
            for (let row = ROWS - 1; row >= 0; row--) {
                let full = true;
                for (let col = 0; col < COLS; col++) {
                    if (!board[row][col]) {
                        full = false;
                        break;
                    }
                }
                if (full) {
                    board.splice(row, 1);
                    board.unshift(Array(COLS).fill(0));
                    row++;
                    linesCleared++;
                }
            }
            
            if (linesCleared > 0) {
                score += linesCleared === 1 ? 100 : linesCleared === 2 ? 300 : linesCleared === 3 ? 600 : 1000;
                scoreElement.textContent = score;
            }
            
            activePiece = randomPiece();
            if (collision(activePiece.shape, activePiece.x, activePiece.y)) {
                clearInterval(gameInterval);
                gameInterval = null;
                alert('Игра окончена! Счёт: ' + score);
                resetGame();
            }
            drawBoard();
        }

        function movePiece(dx, dy) {
            if (!activePiece) return;
            const newX = activePiece.x + dx;
            const newY = activePiece.y + dy;
            if (!collision(activePiece.shape, newX, newY)) {
                activePiece.x = newX;
                activePiece.y = newY;
                drawBoard();
                return true;
            }
            if (dy === 1) {
                mergePiece();
                drawBoard();
            }
            return false;
        }

        function rotatePiece() {
            if (!activePiece) return;
            const rotated = activePiece.shape[0].map((_, idx) => activePiece.shape.map(row => row[idx]).reverse());
            if (!collision(rotated, activePiece.x, activePiece.y)) {
                activePiece.shape = rotated;
                drawBoard();
            }
        }

        function dropPiece() {
            while (movePiece(0, 1)) {}
        }

        function resetGame() {
            if (gameInterval) clearInterval(gameInterval);
            board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            score = 0;
            scoreElement.textContent = score;
            activePiece = randomPiece();
            drawBoard();
            gameInterval = setInterval(() => movePiece(0, 1), 400);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') movePiece(-1, 0);
            else if (e.key === 'ArrowRight') movePiece(1, 0);
            else if (e.key === 'ArrowDown') movePiece(0, 1);
            else if (e.key === 'ArrowUp') rotatePiece();
            else if (e.key === ' ') dropPiece();
        });

        document.getElementById('resetBtn').onclick = resetGame;
        
        resetGame();
    </script>
</body>
</html>
