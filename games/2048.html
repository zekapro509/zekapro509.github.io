<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>2048 - TLC zekapro509</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Google Sans', Arial, sans-serif;
            font-weight: 500;
        }
        .game-container {
            text-align: center;
            padding: 20px;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            gap: 10px;
            background-color: #bbada0;
            padding: 15px;
            border-radius: 10px;
            margin: 20px auto;
            width: fit-content;
        }
        .tile {
            width: 100px;
            height: 100px;
            background-color: #cdc1b4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            border-radius: 8px;
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #000000;
            color: #ffffff;
            border: 2px solid #000000;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            z-index: 1000;
            text-decoration: none;
        }
        .back-btn:hover {
            background: #ffffff;
            color: #000000;
            border: 2px solid #000000;
        }
        .score {
            font-size: 24px;
            margin-bottom: 10px;
        }
        button {
            background: #000000;
            color: #ffffff;
            border: 2px solid #000000;
            padding: 8px 24px;
            font-size: 18px;
            font-family: 'Google Sans', Arial, sans-serif;
            font-weight: 500;
            border-radius: 90px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>
    <a href="./" class="back-btn">←</a>

    <div class="game-container">
        <h1>2048</h1>
        <div class="score">Счёт: <span id="score">0</span></div>
        <div id="board" class="board"></div>
        <button id="resetBtn">Новая игра</button>
    </div>

    <script>
        let grid = Array(4).fill().map(() => Array(4).fill(0));
        let score = 0;
        
        function initGame() {
            grid = Array(4).fill().map(() => Array(4).fill(0));
            score = 0;
            document.getElementById('score').textContent = score;
            addRandomTile();
            addRandomTile();
            renderBoard();
        }
        
        function addRandomTile() {
            const empty = [];
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (grid[i][j] === 0) empty.push([i, j]);
                }
            }
            if (empty.length > 0) {
                const [row, col] = empty[Math.floor(Math.random() * empty.length)];
                grid[row][col] = Math.random() < 0.9 ? 2 : 4;
            }
        }
        
        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    if (grid[i][j] !== 0) {
                        tile.textContent = grid[i][j];
                        const colors = {
                            2: '#eee4da', 4: '#ede0c8', 8: '#f2b179',
                            16: '#f59563', 32: '#f67c5f', 64: '#f65e3b',
                            128: '#edcf72', 256: '#edcc61', 512: '#edc850',
                            1024: '#edc53f', 2048: '#edc22e'
                        };
                        tile.style.backgroundColor = colors[grid[i][j]] || '#3c3a32';
                        tile.style.color = grid[i][j] > 4 ? 'white' : '#776e65';
                    } else {
                        tile.style.backgroundColor = '#cdc1b4';
                        tile.textContent = '';
                    }
                    board.appendChild(tile);
                }
            }
            document.getElementById('score').textContent = score;
        }
        
        function move(direction) {
            let moved = false;
            const oldGrid = JSON.parse(JSON.stringify(grid));
            
            for (let i = 0; i < 4; i++) {
                let line = [];
                for (let j = 0; j < 4; j++) {
                    let val = direction === 'left' ? grid[i][j] :
                              direction === 'right' ? grid[i][3-j] :
                              direction === 'up' ? grid[j][i] :
                              grid[3-j][i];
                    if (val !== 0) line.push(val);
                }
                
                for (let j = 0; j < line.length - 1; j++) {
                    if (line[j] === line[j+1]) {
                        line[j] *= 2;
                        score += line[j];
                        line.splice(j+1, 1);
                    }
                }
                
                while (line.length < 4) line.push(0);
                
                for (let j = 0; j < 4; j++) {
                    let val = line[j];
                    if (direction === 'left') grid[i][j] = val;
                    else if (direction === 'right') grid[i][3-j] = val;
                    else if (direction === 'up') grid[j][i] = val;
                    else grid[3-j][i] = val;
                }
            }
            
            if (JSON.stringify(oldGrid) !== JSON.stringify(grid)) moved = true;
            if (moved) {
                addRandomTile();
                renderBoard();
                if (isGameOver()) alert('Игра окончена! Счёт: ' + score);
            }
        }
        
        function isGameOver() {
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (grid[i][j] === 0) return false;
                    if (j < 3 && grid[i][j] === grid[i][j+1]) return false;
                    if (i < 3 && grid[i][j] === grid[i+1][j]) return false;
                }
            }
            return true;
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') move('left');
            else if (e.key === 'ArrowRight') move('right');
            else if (e.key === 'ArrowUp') move('up');
            else if (e.key === 'ArrowDown') move('down');
        });
        
        document.getElementById('resetBtn').onclick = initGame;
        
        initGame();
    </script>
</body>
</html>
