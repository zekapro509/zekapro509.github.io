<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мессенджер - TLC zekapro509</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="messenger.css">
</head>
<body>
    <div id="app">
        <div id="homePage">
            <h1>TLC Messenger</h1>
            <p>Приватный P2P мессенджер · сообщения только между браузерами</p>

            <div class="messenger-container">
                <div class="connection-panel">
                    <div style="margin-bottom: 8px;">
                        <span style="font-weight: 700;">Ваш ID:</span>
                    </div>
                    <div class="peer-id-display" id="myPeerId">Генерация...</div>
                    <button class="small-btn" onclick="copyMyId()" style="width: 100%;">Скопировать мой ID</button>
                    
                    <div style="margin-top: 20px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 500;">ID собеседника:</label>
                        <div class="input-group">
                            <input type="text" id="remotePeerId" placeholder="Вставьте ID..." autocomplete="off" spellcheck="false">
                            <button class="small-btn" onclick="connectToPeer()">Подключиться</button>
                        </div>
                    </div>
                    
                    <div id="errorMessage" style="color: #cc0000; font-size: 14px; margin-top: 10px; text-align: center;"></div>
                </div>
            </div>
        </div>

        <div id="chatPage" style="display: none;">
            <h1>TLC Messenger</h1>
            <p>Чат с <span id="chatPeerId"></span></p>

            <div class="messenger-container">
                <div class="chat-area">
                    <div style="display: flex; justify-content: flex-end; margin-bottom: 10px;">
                        <button class="small-btn" onclick="disconnectAndGoHome()" style="padding: 8px 16px;">Выйти</button>
                    </div>
                    <div class="messages-box" id="messagesBox">
                        <div class="empty-chat">Сообщений пока нет</div>
                    </div>
                    <div class="message-input-area">
                        <input type="text" id="messageInput" placeholder="Введите сообщение..." onkeypress="handleKeyPress(event)" autocomplete="off" spellcheck="false">
                        <button class="small-btn" onclick="sendMessage()">Отправить</button>
                    </div>
                    <div id="chatErrorMessage" style="color: #cc0000; font-size: 14px; margin-top: 10px; text-align: center;"></div>
                </div>
            </div>
        </div>
    </div>

    <a href="#" class="back-btn" onclick="goBack(event)">←</a>

    <script>
        function goBack(event) {
            event.preventDefault();
            disconnectAndGoHome();
        }
    </script>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="messenger.js"></script>
</body>
</html>
