<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новости — TLC zekapro509</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <a href="../" class="back-btn" aria-label="Назад">←</a>

    <h1>Новости</h1>

    <div id="news-container">
        <p class="loading">Загрузка...</p>
    </div>

    <script>
        function loadNews() {
            var container = document.getElementById('news-container');
            
            fetch('news.json?t=' + Date.now())
                .then(function(response) {
                    if (!response.ok) throw new Error('HTTP error: ' + response.status);
                    return response.json();
                })
                .then(function(data) {
                    if (data.news && data.news.length > 0) {
                        // Сортировка по дате (новые сверху)
                        data.news.sort(function(a, b) {
                            return new Date(b.date) - new Date(a.date);
                        });
                        
                        container.innerHTML = '';
                        
                        data.news.forEach(function(item) {
                            var article = document.createElement('article');
                            article.className = 'news-item';
                            
                            // Форматирование даты из 2026-04-13 в 13.04.2026
                            var parts = item.date.split('-');
                            var formattedDate = parts[2] + '.' + parts[1] + '.' + parts[0];
                            
                            article.innerHTML = '<h3>' + formattedDate + ' — ' + item.title + '</h3>' +
                                             '<p>' + item.content + '</p>';
                            container.appendChild(article);
                        });
                    } else {
                        container.innerHTML = '<p>Новостей пока нет.</p>';
                    }
                })
                .catch(function(error) {
                    console.error('Ошибка загрузки новостей:', error);
                    container.innerHTML = '<p>Не удалось загрузить новости.</p>';
                });
        }
        
        loadNews();
    </script>
</body>
</html>
