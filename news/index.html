<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Новости - TLC zekapro509</title>
    <link rel="stylesheet" href="../style.css">
    <script>
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.documentElement.classList.add('dark-theme');
            }
        })();
    </script>
</head>
<body>
    <button class="theme-toggle" id="theme-toggle">☀</button>

    <h1>Новости</h1>

    <div id="news-container"></div>

    <a href="../">
        <button class="news-btn">На главную</button>
    </a>

    <script>
        // Тёмная тема
        const toggleButton = document.getElementById('theme-toggle');
        function setTheme(isDark) {
            if (isDark) {
                document.documentElement.classList.add('dark-theme');
                toggleButton.textContent = '☾';
            } else {
                document.documentElement.classList.remove('dark-theme');
                toggleButton.textContent = '☀';
            }
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }
        const savedTheme = localStorage.getItem('theme');
        setTheme(savedTheme === 'dark');
        toggleButton.onclick = () => setTheme(!document.documentElement.classList.contains('dark-theme'));

        // Загрузка новостей
        async function loadNews() {
            try {
                const response = await fetch('news.json?t=' + Date.now());
                if (!response.ok) throw new Error('Файл не найден');
                const data = await response.json();
                const container = document.getElementById('news-container');
                container.innerHTML = '';
                if (data.news && data.news.length > 0) {
                    data.news.forEach(news => {
                        const div = document.createElement('div');
                        div.className = 'news-item';
                        div.innerHTML = `<h3>${news.date} — ${news.title}</h3><p>${news.content}</p>`;
                        container.appendChild(div);
                    });
                } else {
                    container.innerHTML = '<p>Новостей пока нет.</p>';
                }
            } catch (error) {
                console.error(error);
                document.getElementById('news-container').innerHTML = '<p>Ошибка загрузки новостей. Проверь консоль (F12).</p>';
            }
        }
        loadNews();
    </script>
</body>
</html>
