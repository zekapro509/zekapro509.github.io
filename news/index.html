<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новости — TLC zekapro509</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <a href="../" class="back-btn" aria-label="Назад">←</a>

    <h1>Новости</h1>

    <div id="news-container">
        <p class="loading">Загрузка новостей...</p>
    </div>

    <script>
        async function loadNews() {
            const container = document.getElementById('news-container');
            
            try {
                const response = await fetch(`news.json?t=${Date.now()}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.news && data.news.length > 0) {
                    container.innerHTML = '';
                    
                    data.news.forEach(item => {
                        const article = document.createElement('article');
                        article.className = 'news-item';
                        article.innerHTML = `
                            <h3>${item.date} — ${item.title}</h3>
                            <p>${item.content}</p>
                        `;
                        container.appendChild(article);
                    });
                } else {
                    container.innerHTML = '<p>😴 Новостей пока нет.</p>';
                }
            } catch (error) {
                console.error('Ошибка загрузки новостей:', error);
                container.innerHTML = '<p>❌ Не удалось загрузить новости. Попробуйте позже.</p>';
            }
        }
        
        loadNews();
    </script>
</body>
</html>
