<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Новости - TLC zekapro509</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #000000;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-family: 'Google Sans', Arial, sans-serif;
            font-weight: 500;
        }
        .back-btn:hover {
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #000000;
        }
    </style>
</head>
<body>
    <a href="../" class="back-btn">←</a>

    <h1>Новости</h1>

    <div id="news-container"></div>

    <script>
        async function loadNews() {
            try {
                const response = await fetch('news.json?t=' + Date.now());
                if (!response.ok) throw new Error('Файл не найден');
                const data = await response.json();
                const container = document.getElementById('news-container');
                container.innerHTML = '';
                if (data.news && data.news.length > 0) {
                    data.news.forEach(news => {
                        const div = document.createElement('div');
                        div.className = 'news-item';
                        div.innerHTML = `<h3>${news.date} — ${news.title}</h3><p>${news.content}</p>`;
                        container.appendChild(div);
                    });
                } else {
                    container.innerHTML = '<p>Новостей пока нет.</p>';
                }
            } catch (error) {
                document.getElementById('news-container').innerHTML = '<p>Ошибка загрузки новостей.</p>';
            }
        }
        loadNews();
    </script>
</body>
</html>
