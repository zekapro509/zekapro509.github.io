<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GPU Benchmark Low — TLC zekapro509</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Google Sans', Arial, sans-serif;
            background-color: #050510;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 30px;
            z-index: 100;
            pointer-events: none;
            font-size: 14px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.15);
        }
        #fps {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 8px 18px;
            border-radius: 30px;
            z-index: 100;
            font-family: monospace;
            font-size: 20px;
            font-weight: bold;
            pointer-events: none;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.15);
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.7);
            background: rgba(0,0,0,0.4);
            padding: 6px 16px;
            border-radius: 30px;
            z-index: 100;
            font-size: 12px;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
        .back-link {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 8px 18px;
            border-radius: 30px;
            z-index: 100;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.2s ease;
        }
        .back-link:hover {
            background: white;
            color: black;
        }
        @media (max-width: 768px) {
            #info { font-size: 12px; padding: 6px 12px; }
            #fps { font-size: 16px; padding: 6px 14px; }
            .controls { display: none; }
            .back-link { font-size: 12px; padding: 6px 14px; }
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="info"><strong>GPU Benchmark LOW</strong> | 1000 сфер</div>
    <div id="fps">FPS: --</div>
    <div class="controls">🖱️ Мышь: вращать | 🔍 Скролл: приблизить</div>
    <a href="../" class="back-link">← Назад</a>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Определяем мобильное устройство для оптимизации
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) 
                         || window.innerWidth < 768;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.FogExp2(0x050510, isMobile ? 0.003 : 0.002);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 4, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ 
            antialias: !isMobile, // На мобиле отключаем сглаживание для производительности
            powerPreference: "high-performance" 
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        // На мобилках тени жрут много ресурсов — отключаем
        renderer.shadowMap.enabled = !isMobile;
        if (!isMobile) {
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        }
        
        // Ограничиваем пиксели на мобилках
        const pixelRatio = isMobile ? Math.min(window.devicePixelRatio, 1.5) : window.devicePixelRatio;
        renderer.setPixelRatio(pixelRatio);
        
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = isMobile ? 0.03 : 0.05;
        controls.enableZoom = true;
        controls.zoomSpeed = isMobile ? 0.8 : 1.2;
        controls.rotateSpeed = isMobile ? 0.6 : 1.0;
        controls.enablePan = !isMobile; // На мобилках панорамирование отключаем
        controls.target.set(0, 0, 0);

        // Освещение (упрощённое на мобилках)
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffffff, isMobile ? 1.0 : 1.2);
        mainLight.position.set(5, 10, 3);
        if (!isMobile) {
            mainLight.castShadow = true;
            mainLight.shadow.mapSize.width = 1024;
            mainLight.shadow.mapSize.height = 1024;
        }
        scene.add(mainLight);
        
        const backLight = new THREE.PointLight(0x4466cc, isMobile ? 0.4 : 0.6);
        backLight.position.set(-2, 2, -3);
        scene.add(backLight);
        
        const fillLight = new THREE.PointLight(0xffaa66, isMobile ? 0.3 : 0.5);
        fillLight.position.set(3, 1, 2);
        scene.add(fillLight);
        
        // На мобилках убираем движущийся свет для экономии
        let movingLight;
        if (!isMobile) {
            movingLight = new THREE.PointLight(0xff66aa, 0.7);
            movingLight.castShadow = true;
            scene.add(movingLight);
        }

        // Инстансинг сфер (ЗАПОЛНЕННЫЙ ШАР)
        const count = 1000;
        // На мобилках упрощаем геометрию сферы
        const sphereDetail = isMobile ? 16 : 24;
        const geometry = new THREE.SphereGeometry(0.08, sphereDetail, sphereDetail);
        const material = new THREE.MeshStandardMaterial({ 
            roughness: 0.3, 
            metalness: 0.7,
            emissive: new THREE.Color(0x111122),
            emissiveIntensity: 0.1
        });
        const instancedMesh = new THREE.InstancedMesh(geometry, material, count);
        
        const dummy = new THREE.Object3D();
        const radius = 3.0;
        
        for (let i = 0; i < count; i++) {
            // Заполненный шар (равномерно по объёму)
            const u = Math.random();
            const v = Math.random();
            const w = Math.random();
            
            const theta = 2 * Math.PI * u;
            const phi = Math.acos(2 * v - 1);
            const r = radius * Math.cbrt(w);
            
            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.sin(phi) * Math.sin(theta);
            const z = r * Math.cos(phi);
            
            dummy.position.set(x, y, z);
            dummy.scale.setScalar(0.7 + Math.random() * 0.8);
            dummy.updateMatrix();
            instancedMesh.setMatrixAt(i, dummy.matrix);
            
            instancedMesh.setColorAt(i, new THREE.Color().setHSL(Math.random(), 0.9, 0.6));
        }
        
        instancedMesh.instanceMatrix.needsUpdate = true;
        instancedMesh.instanceColor.needsUpdate = true;
        instancedMesh.castShadow = !isMobile;
        instancedMesh.receiveShadow = false;
        scene.add(instancedMesh);

        // Добавим несколько звёзд на фон (чисто для красоты, не влияет на FPS)
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 800;
        const starPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i += 3) {
            starPositions[i] = (Math.random() - 0.5) * 200;
            starPositions[i+1] = (Math.random() - 0.5) * 200;
            starPositions[i+2] = (Math.random() - 0.5) * 200;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({color: 0xffffff, size: 0.15, transparent: true});
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        let time = 0;
        let frameCount = 0;
        let lastTime = performance.now();
        const fpsElement = document.getElementById('fps');
        
        function updateFPS() {
            frameCount++;
            const now = performance.now();
            if (now >= lastTime + 500) { // Обновляем раз в 500мс для плавности отображения
                const fps = Math.round((frameCount * 1000) / (now - lastTime));
                fpsElement.textContent = `FPS: ${fps}`;
                if (fps < 30) fpsElement.style.color = '#ff6666';
                else if (fps < 50) fpsElement.style.color = '#ffaa66';
                else fpsElement.style.color = '#66ff66';
                frameCount = 0;
                lastTime = now;
            }
        }
        
        function animate() {
            requestAnimationFrame(animate);
            time += isMobile ? 0.008 : 0.015; // На мобилках медленнее вращение
            
            if (!isMobile && movingLight) {
                movingLight.position.x = Math.sin(time) * 5;
                movingLight.position.z = Math.cos(time * 0.7) * 5;
                movingLight.position.y = 1.5 + Math.sin(time * 1.3) * 1.2;
            }
            
            instancedMesh.rotation.y = time * 0.08;
            instancedMesh.rotation.x = Math.sin(time * 0.2) * 0.2;
            
            stars.rotation.y += 0.0002;
            
            controls.update();
            renderer.render(scene, camera);
            updateFPS();
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            // При ресайзе на мобилке снова адаптируем пиксели
            const newIsMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) 
                                || window.innerWidth < 768;
            const newPixelRatio = newIsMobile ? Math.min(window.devicePixelRatio, 1.5) : window.devicePixelRatio;
            renderer.setPixelRatio(newPixelRatio);
        });
        
        // Обработка видимости страницы (пауза анимации, если вкладка неактивна)
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                // Можно приостановить, но оставим как есть
            }
        });
    </script>
</body>
</html>
