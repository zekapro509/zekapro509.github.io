<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPU Benchmark — TLC zekapro509</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .level-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin: 30px 0;
        }
        
        .level-btn {
            width: 300px;
            padding: 18px 24px;
            font-size: 22px;
        }
        
        .level-desc {
            font-size: 14px;
            opacity: 0.7;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <a href="../" class="back-btn" aria-label="Назад">←</a>

    <div class="container">
        <h1>GPU Benchmark</h1>
        <p>Выберите уровень нагрузки для теста видеокарты</p>

        <div class="level-grid">
            <a href="low/" class="btn level-btn">
                Low
                <span class="level-desc">1000 сфер</span>
            </a>
            
            <a href="medium/" class="btn level-btn">
                Medium
                <span class="level-desc">2500 сфер</span>
            </a>
            
            <a href="high/" class="btn level-btn">
                High
                <span class="level-desc">5000 сфер</span>
            </a>
            
            <a href="ultra/" class="btn level-btn">
                Ultra
                <span class="level-desc">10000 сфер</span>
            </a>
            
            <a href="extreme/" class="btn level-btn">
                Extreme
                <span class="level-desc">20000 сфер</span>
            </a>
            
            <a href="god/" class="btn level-btn">
                God
                <span class="level-desc">50000 сфер</span>
            </a>
        </div>
    </div>

    <script src="../js/browser-check.js"></script>
</body>
</html>
