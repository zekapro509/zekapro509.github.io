<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GPU Benchmark - TLC zekapro509</title>
    <script>
        // Супер-быстрое применение темы ДО любого рендеринга
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.documentElement.style.backgroundColor = '#1a1a1a';
                document.body.style.backgroundColor = '#1a1a1a';
            } else {
                document.documentElement.style.backgroundColor = '#ffffff';
                document.body.style.backgroundColor = '#ffffff';
            }
        })();
    </script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI Black', Arial, sans-serif;
            transition: 0.3s;
        }
        body.dark-theme {
            background-color: #1a1a1a;
        }
        .menu {
            text-align: center;
            background: rgba(0,0,0,0.7);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }
        h1 {
            color: white;
            margin-bottom: 40px;
            font-size: 32px;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }
        .bench-btn {
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 16px 48px;
            font-size: 24px;
            font-family: 'Segoe UI Black', Arial, sans-serif;
            border-radius: 90px;
            cursor: pointer;
            transition: 0.3s;
            width: 250px;
            text-decoration: none;
            display: inline-block;
        }
        .bench-btn:hover {
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #000000;
        }
        .note {
            color: #aaa;
            margin-top: 40px;
            font-size: 14px;
        }
        a {
            text-decoration: none;
        }
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #000000;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 26px;
            cursor: pointer;
            transition: 0.3s;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            line-height: 1;
        }
        .theme-toggle:hover {
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #000000;
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #000000;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            line-height: 1;
            text-decoration: none;
        }
        .back-btn:hover {
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #000000;
        }
        body.dark-theme .theme-toggle,
        body.dark-theme .back-btn {
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #000000;
        }
        body.dark-theme .theme-toggle:hover,
        body.dark-theme .back-btn:hover {
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #ffffff;
        }
    </style>
    <script>
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.body.classList.add('dark-theme');
            }
        })();
    </script>
</head>
<body>
    <a href="../" class="back-btn">←</a>
    <button class="theme-toggle" id="theme-toggle">☀</button>

    <div class="menu">
        <h1>GPU Benchmark</h1>
        <div class="buttons">
            <a href="low/"><button class="bench-btn">Low (1000 сфер)</button></a>
            <a href="medium/"><button class="bench-btn">Medium (2500 сфер)</button></a>
            <a href="high/"><button class="bench-btn">High (5000 сфер)</button></a>
        </div>
        <div class="note">Выберите уровень нагрузки для теста видеокарты</div>
    </div>

    <script>
        const toggleButton = document.getElementById('theme-toggle');
        function setTheme(isDark) {
            if (isDark) {
                document.body.classList.add('dark-theme');
                toggleButton.textContent = '☾';
            } else {
                document.body.classList.remove('dark-theme');
                toggleButton.textContent = '☀';
            }
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            setTheme(true);
        } else {
            setTheme(false);
        }

        toggleButton.onclick = function() {
            const isDark = document.body.classList.contains('dark-theme');
            setTheme(!isDark);
        };
    </script>
</body>
</html>
