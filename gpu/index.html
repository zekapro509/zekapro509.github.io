<style>
    .mobile-block {
        display: none;
        text-align: center;
        padding: 40px 20px;
        max-width: 500px;
        margin: 0 auto;
    }
    
    .mobile-block h2 {
        font-size: 24px;
        margin-bottom: 20px;
        color: #000;
    }
    
    .mobile-block p {
        font-size: 16px;
        color: #333;
        margin-bottom: 30px;
    }
    
    .menu-btn {
        display: inline-block;
        background: #000;
        color: #fff;
        padding: 14px 32px;
        border-radius: 50px;
        text-decoration: none;
        font-size: 18px;
        font-weight: 500;
        border: 2px solid #000;
        transition: all 0.3s ease; /* Добавил transition */
    }
    
    /* ВОТ ЭТОГО НЕ ХВАТАЛО */
    .menu-btn:hover {
        background: #fff;
        color: #000;
        transform: scale(1.05); /* Такое же увеличение, как у всех кнопок */
    }
    
    .desktop-content {
        display: block;
    }
    
    @media (max-width: 768px) {
        .desktop-content {
            display: none !important;
        }
        
        .mobile-block {
            display: block !important;
        }
        
        .back-btn {
            display: none !important;
        }
    }
    
    h1 {
        margin-top: 15px;
        margin-bottom: 15px;
        font-size: 32px;
    }
    
    .buttons {
        gap: 10px;
        margin: 10px 0;
    }
    
    .btn {
        padding: 12px 24px;
        font-size: 20px;
        width: 260px;
    }
    
    .btn span {
        font-size: 13px;
        opacity: 0.7;
    }
</style>
