<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GPU Benchmark - TLC zekapro509</title>
    <style>
        /* Системная тема по умолчанию (без скриптов) */
        body {
            margin: 0;
            min-height: 100vh;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI Black', Arial, sans-serif;
            transition: 0.3s;
        }
        /* Автоматическая тёмная тема, если система в тёмной теме */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #1a1a1a;
            }
            h1 {
                color: #ffffff;
            }
            .note {
                color: #aaa;
            }
        }
        /* Класс для ручного переключения (перебивает системную) */
        body.dark-theme {
            background-color: #1a1a1a;
        }
        body.dark-theme h1 {
            color: #ffffff;
        }
        body.dark-theme .note {
            color: #aaa;
        }
        .menu {
            text-align: center;
            background: transparent;
            padding: 40px;
        }
        h1 {
            color: #000000;
            margin-bottom: 40px;
            font-size: 32px;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }
        .bench-btn {
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #000000;
            padding: 16px 48px;
            font-size: 24px;
            font-family: 'Segoe UI Black', Arial, sans-serif;
            border-radius: 90px;
            cursor: pointer;
            transition: 0.3s;
            width: 250px;
            text-decoration: none;
            display: inline-block;
        }
        .bench-btn:hover {
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #000000;
        }
        /* Тёмная тема для кнопок */
        @media (prefers-color-scheme: dark) {
            .bench-btn {
                background-color: #ffffff;
                color: #000000;
                border: 2px solid #000000;
            }
            .bench-btn:hover {
                background-color: #000000;
                color: #ffffff;
                border: 2px solid #ffffff;
            }
        }
        body.dark-theme .bench-btn {
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #000000;
        }
        body.dark-theme .bench-btn:hover {
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #ffffff;
        }
        .note {
            color: #333;
            margin-top: 40px;
            font-size: 14px;
        }
        a {
            text-decoration: none;
        }
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #000000;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 26px;
            cursor: pointer;
            transition: 0.3s;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            line-height: 1;
        }
        .theme-toggle:hover {
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #000000;
        }
        @media (prefers-color-scheme: dark) {
            .theme-toggle {
                background-color: #ffffff;
                color: #000000;
                border: 2px solid #000000;
            }
            .theme-toggle:hover {
                background-color: #000000;
                color: #ffffff;
                border: 2px solid #ffffff;
            }
        }
        body.dark-theme .theme-toggle {
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #000000;
        }
        body.dark-theme .theme-toggle:hover {
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #ffffff;
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #000000;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            line-height: 1;
            text-decoration: none;
        }
        .back-btn:hover {
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #000000;
        }
        @media (prefers-color-scheme: dark) {
            .back-btn {
                background-color: #ffffff;
                color: #000000;
                border: 2px solid #000000;
            }
            .back-btn:hover {
                background-color: #000000;
                color: #ffffff;
                border: 2px solid #ffffff;
            }
        }
        body.dark-theme .back-btn {
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #000000;
        }
        body.dark-theme .back-btn:hover {
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #ffffff;
        }
    </style>
    <script>
        // Проверяем, была ли тема выбрана вручную ранее
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-theme');
        } else if (savedTheme === 'light') {
            document.body.classList.remove('dark-theme');
        }
        // Если сохранённой темы нет, оставляем системную (через CSS)
    </script>
</head>
<body>
    <a href="../" class="back-btn">←</a>
    <button class="theme-toggle" id="theme-toggle">☀</button>

    <div class="menu">
        <h1>GPU Benchmark</h1>
        <div class="buttons">
            <a href="low/"><button class="bench-btn">Low (1000 сфер)</button></a>
            <a href="medium/"><button class="bench-btn">Medium (2500 сфер)</button></a>
            <a href="high/"><button class="bench-btn">High (5000 сфер)</button></a>
        </div>
        <div class="note">Выбери уровень нагрузки для теста видеокарты</div>
    </div>

    <script>
        const toggleButton = document.getElementById('theme-toggle');
        
        function updateButtonAppearance() {
            const isDark = document.body.classList.contains('dark-theme') || 
                          (window.matchMedia('(prefers-color-scheme: dark)').matches && !localStorage.getItem('theme'));
            if (isDark) {
                toggleButton.textContent = '☾';
            } else {
                toggleButton.textContent = '☀';
            }
        }
        
        function setTheme(isDark) {
            if (isDark) {
                document.body.classList.add('dark-theme');
                localStorage.setItem('theme', 'dark');
            } else {
                document.body.classList.remove('dark-theme');
                localStorage.setItem('theme', 'light');
            }
            updateButtonAppearance();
        }

        // Начальная установка кнопки
        updateButtonAppearance();
        
        toggleButton.onclick = function() {
            const isDark = document.body.classList.contains('dark-theme') || 
                          (window.matchMedia('(prefers-color-scheme: dark)').matches && !localStorage.getItem('theme'));
            setTheme(!isDark);
        };
        
        // Следим за изменением системной темы (если пользователь не выбрал вручную)
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            if (!localStorage.getItem('theme')) {
                if (e.matches) {
                    document.body.classList.add('dark-theme');
                } else {
                    document.body.classList.remove('dark-theme');
                }
                updateButtonAppearance();
            }
        });
    </script>
</body>
</html>
