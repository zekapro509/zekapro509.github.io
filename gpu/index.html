<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPU Benchmark — TLC zekapro509</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        /* Сжимаем всё */
        h1 {
            margin-top: 15px;
            margin-bottom: 5px;
            font-size: 32px;
        }
        
        p {
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        .buttons {
            gap: 10px;
            margin: 10px 0;
        }
        
        .btn {
            padding: 10px 24px;
            font-size: 20px;
            width: 260px;
        }
        
        .btn span {
            font-size: 13px;
            opacity: 0.7;
        }
        
        /* Ещё сильнее жмём на маленьких экранах */
        @media (max-width: 768px) {
            h1 {
                margin-top: 60px;
                font-size: 28px;
            }
            
            .btn {
                padding: 8px 20px;
                font-size: 18px;
                width: 240px;
            }
        }
    </style>
</head>
<body>
    <a href="../" class="back-btn" aria-label="Назад">←</a>

    <div class="container">
        <h1>GPU Benchmark</h1>
        <p>Выберите уровень нагрузки</p>

        <div class="buttons">
            <a href="low/" class="btn">Low<br><span>1000 сфер</span></a>
            <a href="medium/" class="btn">Medium<br><span>2500 сфер</span></a>
            <a href="high/" class="btn">High<br><span>5000 сфер</span></a>
            <a href="ultra/" class="btn">Ultra<br><span>10000 сфер</span></a>
            <a href="extreme/" class="btn">Extreme<br><span>20000 сфер</span></a>
            <a href="god/" class="btn">God<br><span>50000 сфер</span></a>
        </div>
    </div>

    <script src="../js/browser-check.js"></script>
</body>
</html>
