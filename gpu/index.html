<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GPU Benchmark - TLC zekapro509</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background-color: #2c2c2c;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI Black', Arial, sans-serif;
        }
        .menu {
            text-align: center;
            background: rgb(0, 0, 0);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }
        h1 {
            color: white;
            margin-bottom: 40px;
            font-size: 32px;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }
        .bench-btn {
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 16px 48px;
            font-size: 24px;
            font-family: 'Segoe UI Black', Arial, sans-serif;
            border-radius: 90px;
            cursor: pointer;
            transition: 0.3s;
            width: 250px;
            text-decoration: none;
            display: inline-block;
        }
        .bench-btn:hover {
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #000000;
        }
        .note {
            color: #aaa;
            margin-top: 40px;
            font-size: 14px;
        }
        a {
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="menu">
        <h1>GPU Benchmark</h1>
        <div class="buttons">
            <a href="low/"><button class="bench-btn">Low (1000 сфер)</button></a>
            <a href="medium/"><button class="bench-btn">Medium (2500 сфер)</button></a>
            <a href="high/"><button class="bench-btn">High (5000 сфер)</button></a>
        </div>
        <div class="note">Выберите уровень нагрузки для теста видеокарты</div>
    </div>
</body>
</html>
