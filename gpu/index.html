<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GPU Benchmark - TLC zekapro509</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Google Sans', Arial, sans-serif;
            font-weight: 500;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 36px;
            margin-bottom: 40px;
            color: #000000;
            font-family: 'Google Sans', Arial, sans-serif;
            font-weight: 700;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }
        .btn {
            background: #000000;
            color: #ffffff;
            border: 2px solid #000000;
            padding: 16px 48px;
            font-size: 24px;
            font-family: 'Google Sans', Arial, sans-serif;
            font-weight: 500;
            border-radius: 90px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 280px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            background: #ffffff;
            color: #000000;
            border: 2px solid #000000;
        }
        .note {
            margin-top: 40px;
            font-size: 14px;
            color: #555;
            font-family: 'Google Sans', Arial, sans-serif;
            font-weight: 500;
        }
        .fixed-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #000000;
            color: #ffffff;
            border: 2px solid #000000;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            z-index: 1000;
            text-decoration: none;
            font-family: 'Google Sans', Arial, sans-serif;
            font-weight: 500;
        }
        .fixed-btn:hover {
            background: #ffffff;
            color: #000000;
            border: 2px solid #000000;
        }
    </style>
</head>
<body>
    <a href="../" class="fixed-btn">←</a>

    <div class="container">
        <h1>GPU Benchmark</h1>
        <div class="buttons">
            <a href="low/" class="btn">Low (1000 сфер)</a>
            <a href="medium/" class="btn">Medium (2500 сфер)</a>
            <a href="high/" class="btn">High (5000 сфер)</a>
        </div>
        <div class="note">Выберите уровень нагрузки для теста видеокарты</div>
    </div>
</body>
</html>
