<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GPU Benchmark Extreme — TLC zekapro509</title>
    <script>
        var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        if (isMobile) window.location.href = '../';
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Google Sans', Arial, sans-serif;
            background-color: #000000;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 100;
            pointer-events: none;
            font-size: 16px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.15);
        }
        #fps {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px 22px;
            border-radius: 30px;
            z-index: 100;
            font-family: monospace;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.15);
        }
        .back-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 100;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="info">GPU Benchmark EXTREME | 25000 сфер</div>
    <div id="fps">FPS: --</div>
    <a href="../" class="back-btn">← Назад</a>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.FogExp2(0x000000, 0.0012);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 7, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2.0));
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.03;
        controls.enableZoom = true;
        controls.zoomSpeed = 0.8;
        controls.rotateSpeed = 0.6;
        controls.target.set(0, 0, 0);

        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.0);
        mainLight.position.set(5, 10, 3);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        mainLight.shadow.bias = -0.0005;
        mainLight.shadow.camera.far = 18.0;
        scene.add(mainLight);
        
        const backLight = new THREE.PointLight(0x4466cc, 0.5);
        backLight.position.set(-2, 2, -3);
        scene.add(backLight);
        
        const fillLight = new THREE.PointLight(0xffaa66, 0.4);
        fillLight.position.set(3, 1, 2);
        scene.add(fillLight);
        
        const movingLight = new THREE.PointLight(0xff66aa, 0.9);
        movingLight.castShadow = true;
        movingLight.shadow.mapSize.width = 512;
        movingLight.shadow.mapSize.height = 512;
        movingLight.shadow.bias = -0.0005;
        movingLight.shadow.camera.far = 5.0;
        scene.add(movingLight);

        const count = 25000;
        const geometry = new THREE.SphereGeometry(0.04, 12, 12);
        const material = new THREE.MeshStandardMaterial({ roughness: 0.2, metalness: 0.9 });
        const instancedMesh = new THREE.InstancedMesh(geometry, material, count);
        const dummy = new THREE.Object3D();
        const radius = 5.2;
        
        for (let i = 0; i < count; i++) {
            const u = Math.random();
            const v = Math.random();
            const w = Math.random();
            const theta = 2 * Math.PI * u;
            const phi = Math.acos(2 * v - 1);
            const r = radius * Math.cbrt(w);
            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.sin(phi) * Math.sin(theta);
            const z = r * Math.cos(phi);
            
            dummy.position.set(x, y, z);
            dummy.scale.setScalar(0.3 + Math.random() * 1.1);
            dummy.updateMatrix();
            instancedMesh.setMatrixAt(i, dummy.matrix);
            
            const hue = 0.0 + (r / radius) * 0.1;
            const sat = 0.8 + (r / radius) * 0.2;
            instancedMesh.setColorAt(i, new THREE.Color().setHSL(hue, sat, 0.5));
        }
        
        instancedMesh.instanceMatrix.needsUpdate = true;
        instancedMesh.instanceColor.needsUpdate = true;
        instancedMesh.castShadow = true;
        instancedMesh.receiveShadow = true;
        scene.add(instancedMesh);

        let time = 0;
        let frameCount = 0;
        let lastTime = performance.now();
        const fpsElement = document.getElementById('fps');
        
        function updateFPS() {
            frameCount++;
            const now = performance.now();
            if (now >= lastTime + 500) {
                const fps = Math.round((frameCount * 1000) / (now - lastTime));
                fpsElement.textContent = `FPS: ${fps}`;
                if (fps < 30) fpsElement.style.color = '#ff6666';
                else if (fps < 50) fpsElement.style.color = '#ffaa66';
                else fpsElement.style.color = '#66ff66';
                frameCount = 0;
                lastTime = now;
            }
        }
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.006;
            
            movingLight.position.x = Math.sin(time) * 7;
            movingLight.position.z = Math.cos(time * 0.5) * 7;
            movingLight.position.y = 2.5 + Math.sin(time * 0.9) * 2.0;
            
            instancedMesh.rotation.y = time * 0.03;
            instancedMesh.rotation.x = Math.sin(time * 0.08) * 0.08;
            
            controls.update();
            renderer.render(scene, camera);
            updateFPS();
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2.0));
        });
    </script>
</body>
</html>
