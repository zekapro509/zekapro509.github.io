<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GPU Benchmark GOD — TLC zekapro509</title>
    <script>
        var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        if (isMobile) window.location.href = '../';
    </script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', 'Google Sans', Arial, sans-serif; background-color: #000000; }
        #info { position: absolute; top: 20px; left: 20px; color: #ffaa00; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 30px; z-index: 100; pointer-events: none; font-size: 16px; font-weight: bold; backdrop-filter: blur(4px); border: 1px solid rgba(255,170,0,0.5); text-shadow: 0 0 10px rgba(255,170,0,0.5); }
        #fps { position: absolute; top: 20px; right: 20px; color: #ffaa00; background: rgba(0,0,0,0.7); padding: 10px 22px; border-radius: 30px; z-index: 100; font-family: monospace; font-size: 24px; font-weight: bold; pointer-events: none; backdrop-filter: blur(4px); border: 1px solid rgba(255,170,0,0.5); text-shadow: 0 0 10px rgba(255,170,0,0.5); }
        .back-link { position: absolute; bottom: 20px; right: 20px; color: white; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 30px; z-index: 100; text-decoration: none; font-size: 14px; font-weight: 500; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.2); transition: all 0.2s ease; }
        .back-link:hover { background: #ffaa00; color: black; border-color: #ffaa00; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/" } }
    </script>
</head>
<body>
    <div id="info">GPU Benchmark GOD | 50000 сфер</div>
    <div id="fps">FPS: --</div>
    <a href="../" class="back-link">← Назад</a>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x000000); scene.fog = new THREE.FogExp2(0x000000, 0.0008);
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(6, 5, 12); camera.lookAt(0, 0, 0);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance", precision: "highp" });
        renderer.setSize(window.innerWidth, window.innerHeight); renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap; renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2.0)); document.body.appendChild(renderer.domElement);
        const controls = new OrbitControls(camera, renderer.domElement); controls.enableDamping = true; controls.dampingFactor = 0.03; controls.enableZoom = true; controls.zoomSpeed = 0.8; controls.rotateSpeed = 0.6; controls.enablePan = false; controls.target.set(0, 0, 0); controls.maxPolarAngle = Math.PI / 1.8;
        const ambientLight = new THREE.AmbientLight(0x404060, 0.8); scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xffeedd, 1.2); mainLight.position.set(5, 12, 4); mainLight.castShadow = true; mainLight.shadow.mapSize.width = 1024; mainLight.shadow.mapSize.height = 1024; mainLight.shadow.bias = -0.0005; mainLight.shadow.camera.far = 12.0; scene.add(mainLight);
        const backLight = new THREE.PointLight(0x4466cc, 0.6); backLight.position.set(-3, 3, -5); scene.add(backLight);
        const fillLight = new THREE.PointLight(0xffaa66, 0.5); fillLight.position.set(4, 2, 3); scene.add(fillLight);
        const shadowMapSize = 512, shadowBias = -0.0005, shadowFar = 4.0;
        const movingLight1 = new THREE.PointLight(0xff4488, 0.8); movingLight1.castShadow = true; movingLight1.shadow.mapSize.width = shadowMapSize; movingLight1.shadow.mapSize.height = shadowMapSize; movingLight1.shadow.bias = shadowBias; movingLight1.shadow.camera.far = shadowFar; scene.add(movingLight1);
        const movingLight2 = new THREE.PointLight(0x44aaff, 0.6); movingLight2.castShadow = true; movingLight2.shadow.mapSize.width = shadowMapSize; movingLight2.shadow.mapSize.height = shadowMapSize; movingLight2.shadow.bias = shadowBias; movingLight2.shadow.camera.far = shadowFar; scene.add(movingLight2);
        const count = 50000; const geometry = new THREE.SphereGeometry(0.035, 14, 14); const material = new THREE.MeshStandardMaterial({ roughness: 0.2, metalness: 0.95, emissive: new THREE.Color(0x221111), emissiveIntensity: 0.3 }); const instancedMesh = new THREE.InstancedMesh(geometry, material, count); const dummy = new THREE.Object3D(); const radius = 5.0;
        for (let i = 0; i < count; i++) {
            const u = Math.random(), v = Math.random(), w = Math.random(), theta = 2 * Math.PI * u, phi = Math.acos(2 * v - 1), r = radius * Math.cbrt(w), x = r * Math.sin(phi) * Math.cos(theta), y = r * Math.sin(phi) * Math.sin(theta), z = r * Math.cos(phi);
            dummy.position.set(x, y, z); dummy.scale.setScalar(0.3 + Math.random() * 1.2); dummy.updateMatrix(); instancedMesh.setMatrixAt(i, dummy.matrix);
            const hue = 0.05 + (r / radius) * 0.15, sat = 0.9, light = 0.4 + (r / radius) * 0.4; instancedMesh.setColorAt(i, new THREE.Color().setHSL(hue, sat, light));
        }
        instancedMesh.instanceMatrix.needsUpdate = true; instancedMesh.instanceColor.needsUpdate = true; instancedMesh.castShadow = true; instancedMesh.receiveShadow = true; scene.add(instancedMesh);
        const starsGeometry = new THREE.BufferGeometry(); const starsCount = 4000; const starPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i += 3) { starPositions[i] = (Math.random() - 0.5) * 400; starPositions[i+1] = (Math.random() - 0.5) * 400; starPositions[i+2] = (Math.random() - 0.5) * 400; }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3)); const starsMaterial = new THREE.PointsMaterial({color: 0xffffff, size: 0.08, transparent: true}); const stars = new THREE.Points(starsGeometry, starsMaterial); scene.add(stars);
        let time = 0, frameCount = 0, lastTime = performance.now(); const fpsElement = document.getElementById('fps');
        function updateFPS() { frameCount++; const now = performance.now(); if (now >= lastTime + 500) { const fps = Math.round((frameCount * 1000) / (now - lastTime)); fpsElement.textContent = `FPS: ${fps}`; fpsElement.style.color = fps < 20 ? '#ff4444' : fps < 40 ? '#ffaa00' : '#44ff88'; frameCount = 0; lastTime = now; } }
        function animate() { requestAnimationFrame(animate); time += 0.005; movingLight1.position.x = Math.sin(time * 0.8) * 8; movingLight1.position.z = Math.cos(time * 0.6) * 8; movingLight1.position.y = 3.0 + Math.sin(time * 1.0) * 2.0; movingLight2.position.x = Math.cos(time * 0.5) * 7; movingLight2.position.z = Math.sin(time * 0.7) * 7; movingLight2.position.y = 2.0 + Math.cos(time * 0.9) * 2.5; instancedMesh.rotation.y = time * 0.025; instancedMesh.rotation.x = Math.sin(time * 0.06) * 0.06; stars.rotation.y += 0.00002; controls.update(); renderer.render(scene, camera); updateFPS(); }
        animate();
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2.0)); });
    </script>
</body>
</html>
